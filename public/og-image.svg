<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1200"
  height="630"
  viewBox="0 0 1200 630"
  role="img"
  aria-labelledby="title desc"
>
  <title id="title">Daniel Xu portfolio preview</title>
  <desc id="desc">Open Graph preview for Daniel Xu's portfolio and blog.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#0b0d12" />
      <stop offset="100%" stop-color="#141923" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="75%">
      <stop offset="0%" stop-color="#c67a4a" stop-opacity="0.38" />
      <stop offset="100%" stop-color="#c67a4a" stop-opacity="0" />
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow)" />
  <rect
    x="56"
    y="56"
    width="1088"
    height="518"
    rx="28"
    fill="rgba(20, 25, 35, 0.72)"
    stroke="rgba(255, 255, 255, 0.08)"
  />

  <text
    x="96"
    y="176"
    fill="#c67a4a"
    font-family="Outfit, Arial, sans-serif"
    font-size="28"
    letter-spacing="8"
  >
    DANIEL XU
  </text>
  <text
    x="96"
    y="286"
    fill="#f6f3ef"
    font-family="Outfit, Arial, sans-serif"
    font-size="72"
    font-weight="700"
  >
    Full Stack
  </text>
  <text
    x="96"
    y="370"
    fill="#f6f3ef"
    font-family="Outfit, Arial, sans-serif"
    font-size="72"
    font-weight="700"
  >
    Software Engineer
  </text>
  <text
    x="96"
    y="446"
    fill="#c8ced8"
    font-family="Outfit, Arial, sans-serif"
    font-size="30"
  >
    Portfolio, projects, and writing on building for the web.
  </text>
  <text
    x="96"
    y="520"
    fill="#9ea7b5"
    font-family="Outfit, Arial, sans-serif"
    font-size="24"
  >
    danielx.me
  </text>
</svg>
